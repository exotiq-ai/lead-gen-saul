name: ci

on:
  pull_request:
    branches: [main, "cursor/**"]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  next:
    name: typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: install
        run: npm ci --no-audit --no-fund
      - name: typecheck
        run: npm run typecheck
      - name: build
        # Build needs no runtime secrets — both supabase clients fall back
        # to a placeholder URL when env is missing (lib/supabase/{client,server}.ts).
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: upload next build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          include-hidden-files: true
          retention-days: 2

  python:
    name: python-agent compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: py_compile every python-agent file
        run: |
          find python-agent -type f -name '*.py' -print0 \
            | xargs -0 python3 -m py_compile

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    needs: next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: install
        run: npm ci --no-audit --no-fund
      - name: install playwright browsers
        run: npm run test:e2e:install
      - name: download next build
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next/
      - name: start prod server
        run: |
          npm run start -- -p 3000 &
          npx wait-on http://127.0.0.1:3000 -t 120000
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: ""
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
          SUPABASE_SERVICE_ROLE_KEY: ""
      - name: run e2e
        run: npm run test:e2e
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          CI: "1"
          BASE_URL: http://127.0.0.1:3000
      - name: upload playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
